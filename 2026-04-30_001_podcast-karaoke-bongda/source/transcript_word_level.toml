text = "Cuộc đời này sẽ không nhẹ tay với bất kỳ ai, sông gió có thể làm bạn nghiêng ngặn, cuộc đời có thể làm bạn đầy thương tích, nhưng sẽ không thể quật ngã được một người vẫn còn muốn bước tiếp. Ai rồi cũng sẽ có những giai đoạn mà chỉ thở thôi cũng thấy mệt, chỉ bước tiếp thôi cũng thấy đau. Có những ngày áp lực bổ vây từ mọi phía, tiền không đủ, công việc không như mong muốn, tình cảm không còn bình yên, và ước mơ thì xa đến mức ta bắt đầu nghi ngờ chính mình. Nhưng thật ra, điều đáng sợ nhất chưa bao giờ là dông bão, Điều đáng sợ nhất là khoảnh khắc còn người ta tự buông tay khỏi hy vọng. Bởi người thất bại thật sự không phải là người đã từng vấp ngã, mà là người nằm xuống rồi không muốn đứng lên nữa. Chỉ cần bạn chưa bỏ cuộc, thì mọi khó khăn ngoài kia vẫn chưa thể kết thúc bạn. Chúng ta thường đau khổ vì cứ nhìn vào những điều mình chưa có, mà quên mất những điều mình đang sở hữu đã từng là ước mơ của chính mình ngày trước. Ta ngưỡng mộ cuộc sống của người khác, nhưng lại xem nhẹ sức khỏe của mình. Ta khao khát những thứ thật xa, nhưng lại quên rằng mình vẫn còn gia đình, còn thời gian, còn cơ hội, và còn một trái tim chưa từng ngừng cố gắng. Nhiều người cứ nghĩ phải có thêm thứ gì đó mới đủ mạnh mẽ để đi tiếp. Nhưng đôi khi, điều giữ một người sống sót qua những năm tháng tăm tối nhất lại chính là những gì họ đang có trong tay. Một niềm tin nhỏ, một người còn ở bên, một lý do để cố gắng, và một trái tim chưa chịu đầu hàng. Nên nếu hôm nay bạn mệt thì hãy cho mình được nghỉ ngơi. Nhưng đừng bỏ cuộc, nếu hôm nay bạn thấy mình thua kém, hãy nhớ rằng mọi hành trình lớn đều từng bắt đầu bằng những bước đi rất chậm. Và nếu hôm nay cuộc đời khiến bạn mệt khóc, thì cứ khóc đi. Nhưng sau đó, hãy lau nước mắt và bước tiếp. Vì chỉ cần bạn không từ bỏ, bạn chưa hề thất bại. Và biết đâu, sau tất cả những giông bão này, phiên bản mạnh mẽ nhất của bạn đang đợi bạn ở phía trước."

