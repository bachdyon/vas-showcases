[metadata]
title = "Nguyên lý cốt lõi tạo giá trị"
language = "vi"
platform = "tiktok"
target_duration_seconds = 39
aspect_ratio = "9:16"
source_vds = "jobs/2026-05-06_004_personal_brand_no_broll/source/vds.md"

[creative]
audience = "Người đang làm nội dung và muốn kiếm tiền bền vững"
goal = "Nhấn mạnh tư duy tạo giá trị thay vì bán sức lao động"
emotional_arc = ["hook", "tension", "turn", "resolution"]
tone = "thẳng, sắc, truyền động lực"
cta = "Lưu video để áp dụng cho dự án tiếp theo."

[voiceover]
script = """
Mọi người hãy nhớ, nguyên lý cốt lõi của việc kiếm tiền không phải là bán thời gian, mà là tạo ra giá trị.
Nguyên lý cốt lõi của việc tạo ra giá trị không phải là cung cấp sức lao động, mà là giải quyết vấn đề.
Nguyên lý cốt lõi của việc giải quyết vấn đề là nhận diện nhu cầu thực sự của đám đông, không phải là tự thỏa mãn bản thân.
Nguyên lý cốt lõi của việc nhận diện nhu cầu thực sự là phản hồi từ thực tiễn, không phải chỉ trên lý thuyết.
Nguyên lý cốt lõi của phản hồi từ thực tiễn là lặp lại và cải tiến nhanh chóng, không phải là mài giũa tỉ mỉ.
Nguyên lý cốt lõi của việc lặp lại nhanh chóng là kiểm chứng mô hình, không phải chỉ để bán giao.
Nguyên lý cốt lõi của việc kiểm chứng mô hình là để sao chép thành hệ thống, chứ không phải là cá nhân làm việc cật lực.
Nguyên lý cốt lõi của sao chép hệ thống là tư duy đòn bẩy, không phải là tích lũy theo đường thẳng.
"""
delivery = "dứt khoát, tốc độ vừa, nhấn mạnh từ khóa"

