[render]
fps = 30
width = 1080
height = 1920
duration_seconds = 29.033333
background = "black"
creative_plan_path = "source/creative_plan.toml"

# Intro Remotion đọc props từ Root.tsx — giữ khớp chuỗi với các field dưới khi chỉnh credit.
[intro_chrome]
video_credit = "VIDEO: THANH TUNG TANG"

[style]
vds_path = "source/vds.md"
subtitle_style = "DISABLED"
title_style = "MAIN_TITLE"
color_treatment = "news_overlay_then_source"
main_headline_font = "Bebas Neue"
main_headline_no_text_background = true
transition_to_source = "hard_cut"

# Khớp [vds_style] trong creative_plan (VDS §6–§8)
[vds_style]
intro_visual = "khung overlay tin tức trên video gốc"
clip_001_motion = "news_overlay_frame"
clip_002_motion = "source_full_bleed"

[audio.voice]
file_path = "source/voice.wav"
start = 0.0
gain_db = 0.0
duck_source_under_intro = true

[audio.music]
file_path = ""
start = 0.0
gain_db = -99.0
duck_under_voice = false

