goal = "Dùng các cảnh mưa trầm, đời thường và đô thị để nâng cảm giác suy tư của audio, rồi kết lại bằng cảm giác được an ủi."
emotional_arc = ["ap-luc", "doi-chieu", "tu-nghi-ngo", "thao-go", "chap-nhan", "an-ui"]
