cta = ""

[voiceover]
script = """
Bạn có đang cảm thấy mình là kẻ chậm chân nhất trong cuộc đua của sự trưởng thành không? 25 tuổi, bạn thấy bạn bè khoe xe, khoe nhà. 27 tuổi, bạn thấy người ta lập gia đình, con cái đề huề. Nhìn lại mình, vẫn là những bữa cơm vội, vẫn là căn phòng thuê chưa bao giờ thuộc về mình và một sự nghiệp vẫn còn đang giang dở. Bạn bắt đầu nghi ngờ bản thân, bạn tự hỏi mình đã làm sai ở đâu? Thực ra, bạn chẳng làm sai điều gì cả. Sai lầm duy nhất của chúng ta là đem thước đo của người khác để đo cuộc đời của chính mình. Chúng ta đang sống trong một thời đại mà thành công bị đóng gói thành những công thức 20 tuổi phải có gì, 30 tuổi phải là ai. Nhưng cuộc đời đâu phải là một bài kiểm tra trắc nghiệm để có đáp án đúng duy nhất. Bạn biết không, hoa sen nở mùa hạ, hoa cúc nở mùa thu và hoa mận chỉ nở khi mùa đông buốt giá nhất tràn về. Nếu hoa hồng nở vào tháng 5, không có nghĩa là hoa mận đã thất bại vì chưa nở vào tháng 6. Mỗi loài hoa đều có thời điểm rực rỡ của riêng nó và bạn cũng vậy. Bạn không chậm, bạn chỉ đang ở múi giờ của riêng mình thôi. Đừng để áp lực của thời gian làm tắt đi ngọn đèn bên trong bạn. Miễn là bạn vẫn đang nỗ lực, vẫn đang tử tế và không bỏ cuộc thì việc bạn đi chậm hơn người khác một chút chẳng có vấn đề gì cả. Có những đỉnh núi cần nhiều thời gian hơn để leo nhưng tầm nhìn từ đó cũng sẽ bao la hơn rất nhiều. Hãy hít một hơi thật sâu, bạn đang làm rất tốt rồi. Chỉ cần hôm nay bạn tốt hơn chính mình của ngày hôm qua, đó đã là một thành công vĩ đại.
"""
delivery = "giọng kể chậm, ấm, suy tư, có khoảng nghỉ tự nhiên"

